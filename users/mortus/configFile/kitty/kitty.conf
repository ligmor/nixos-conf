# =========================================================
# KITTY — Material Darker (AwesomeWM matched)
# =========================================================

# ---------- Font ----------
font_family      FiraCode Nerd Font
bold_font        FiraCode Nerd Font Bold
italic_font      FiraCode Nerd Font Italic
bold_italic_font FiraCode Nerd Font Bold Italic
font_size        16.0

disable_ligatures never

# ---------- Window ----------
background_opacity 1.0
confirm_os_window_close 0

# ---------- Colors ----------
background            #212121
foreground            #EEFFFF

# Cursor
cursor                #FFCB6B
cursor_text_color     #212121

# Selection
selection_background  #82AAFF
selection_foreground  #212121

# URL highlight
url_color             #82AAFF

# ---------- ANSI Colors ----------
color0  #212121
color1  #F07178
color2  #C3E88D
color3  #FFCB6B
color4  #82AAFF
color5  #C792EA
color6  #89DDFF
color7  #EEFFFF

color8  #424242
color9  #F07178
color10 #C3E88D
color11 #FFCB6B
color12 #82AAFF
color13 #C792EA
color14 #89DDFF
color15 #FFFFFF

# ---------- Tab Bar ----------
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_foreground   #212121
active_tab_background   #FFCB6B
inactive_tab_foreground #888888
inactive_tab_background #1A1A1A

# ---------- Bell ----------
enable_audio_bell no
visual_bell_duration 0.0

# ---------- Scrollback ----------
scrollback_lines 5000
wheel_scroll_multiplier 5.0

# ---------- Performance ----------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ---------- Key mappings (minimal) ----------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
# map ctrl+shift+p start_selection


